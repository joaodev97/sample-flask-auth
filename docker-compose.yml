services:
  db:
    image: mysql:latest
    restart: always
    environment:
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
      MYSQL_DATABASE: flask-crud
      MYSQL_ROOT_PASSWORD: admin123

    ports:
      - "3307:3307"

    expose:
      - "3307"

    volumes:
      - ./mysql:/var/lib/mysql